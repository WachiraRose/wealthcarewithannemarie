<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Education Hub | WealthCare with Annemarie</title>
    
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        h1 { font-family: 'Playfair Display', serif; }
        .hub-header { 
            background: linear-gradient(135deg, #2d5a5a 0%, #1a3a3a 100%); 
        }
        .resource-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .resource-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="flex items-center gap-2">
            <img src="img/logo.jpg" class="h-8 w-8 rounded-full border border-gray-100">
            <span class="font-bold text-teal-900 tracking-tight">WealthCare Hub</span>
        </a>
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-teal-900 transition tracking-widest">EXIT HUB</a>
        </div>
    </nav>

    <header class="hub-header py-16 md:py-24 px-6 text-white text-center">
        <div class="max-w-3xl mx-auto">
            <span class="text-teal-300 font-bold tracking-[0.3em] text-[10px] uppercase mb-4 block">Exclusive Member Content</span>
            <h1 class="text-4xl md:text-6xl mb-6">Your Education Library</h1>
            <p class="text-teal-50 opacity-80 text-lg leading-relaxed">
                Empowering your family with the knowledge to build, protect, and transfer wealth.
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 md:py-20">
        
        <div id="resource-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10">
            
            <div id="loading-spinner" class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-teal-900 border-t-transparent mb-4"></div>
                <p class="text-gray-500 font-semibold tracking-wide">Syncing resources with Google Sheets...</p>
            </div>

        </div>
    </main>

    <footer class="py-12 border-t border-gray-200 text-center">
        <p class="text-gray-400 text-[10px] tracking-[0.2em] uppercase">
            © 2026 WealthCare with Annemarie • Financial Education Hub
        </p>
    </footer>

    <script>
        // REPLACE WITH THE OWNER'S CSV LINK
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxzcavlDbKLy9R3JzW9MQHvRdXYShfTlcKUBd9Q6oBJEMfSLf6VFApV20gabxSHV4b-2lnuJ5AGppe/pub?output=csv';

        async function loadHub() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                const csvData = await response.text();
                
                // Splitting CSV rows correctly even if there are commas inside quotes
                const rows = csvData.split('\n').slice(1);
                const grid = document.getElementById('resource-grid');
                grid.innerHTML = ''; // Remove loading spinner

                rows.forEach(row => {
                    // Regex to handle commas inside quoted strings (like descriptions)
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    
                    if (!cols || cols.length < 4) return;

                    const title = cols[0].replace(/"/g, "");
                    const desc = cols[1].replace(/"/g, "");
                    const category = cols[2].replace(/"/g, "");
                    const link = cols[3].replace(/"/g, "").trim();
                    
                    // Look for 5th column (Image)
                    let imgSource = cols[4] ? cols[4].replace(/"/g, "").trim() : null;

                    // If it's a Google Drive Link, convert to direct image URL
                    if (imgSource && imgSource.includes('drive.google.com')) {
                        const fileId = imgSource.split('/d/')[1]?.split('/')[0];
                        if (fileId) imgSource = `https://lh3.googleusercontent.com/u/0/d/${fileId}`;
                    }

                    const isVideo = link.includes('youtube.com') || link.includes('youtu.be');
                    const iconClass = isVideo ? 'fa-play-circle text-red-500' : 'fa-file-pdf text-teal-600';
                    const btnLabel = isVideo ? 'Watch Video' : 'Open Resource';

                    // Card HTML template
                    const card = `
                        <div class="resource-card bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                            <div class="aspect-video bg-gray-50 flex items-center justify-center overflow-hidden relative">
                                ${imgSource 
                                    ? `<img src="${imgSource}" class="w-full h-full object-cover" alt="${title}">` 
                                    : `<i class="fas ${iconClass} text-6xl opacity-30"></i>`
                                }
                                <div class="absolute top-4 left-4">
                                    <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest text-teal-900 shadow-sm">
                                        ${category}
                                    </span>
                                </div>
                            </div>
                            <div class="p-8 flex-grow flex flex-col">
                                <h3 class="text-xl font-bold text-gray-900 mb-3 leading-tight">${title}</h3>
                                <p class="text-gray-500 text-sm mb-8 leading-relaxed flex-grow">${desc}</p>
                                <a href="${link}" target="_blank" class="block w-full text-center py-4 bg-teal-900 text-white rounded-2xl font-extrabold text-sm uppercase tracking-widest hover:bg-teal-800 transition shadow-lg shadow-teal-900/10">
                                    ${btnLabel}
                                </a>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

            } catch (err) {
                console.error("Failed to load spreadsheet:", err);
                document.getElementById('resource-grid').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <p class="text-red-500 font-bold">Error loading resources.</p>
                        <p class="text-gray-500 text-sm mt-2">Please ensure the Google Sheet is published to the web as a CSV.</p>
                    </div>
                `;
            }
        }

        // Start the engine
        window.addEventListener('DOMContentLoaded', loadHub);
    </script>
</body>
</html>
