
<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // AUTHENTICATION CHECK
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('access') === 'granted') { localStorage.setItem('hub_access', 'true'); }
        if (localStorage.getItem('hub_access') !== 'true') {
            window.location.href = "index.html#contact";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Hub | WealthCare Resources</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; color: #111827; }
        .serif { font-family: 'Playfair Display', serif; }
        .nav-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .resource-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .resource-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1); }
        .card-image-container { aspect-ratio: 16 / 9; overflow: hidden; background: #0d2e2c; }
        .cat-btn.active { background-color: #134e4a; color: white; border-color: #134e4a; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #134e4a; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 nav-blur border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="img/logo.jpg" class="h-10 w-10 rounded-full border border-gray-100">
            <span class="font-bold text-teal-900 tracking-tight">Wealthcare Hub</span>
        </div>
        <button onclick="logout()" class="text-[10px] font-black text-red-500 border border-red-200 px-3 py-1 rounded-md hover:bg-red-50 transition">LOGOUT</button>
    </nav>

    <header class="pt-32 pb-12 px-6 bg-white border-b border-gray-50">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl serif text-teal-950 mb-4">Resource Library</h1>
            <p class="text-gray-500 max-w-xl mx-auto mb-10 text-lg">Your private collection of legacy building tools.</p>
            
            <div class="max-w-3xl mx-auto space-y-6">
                <div class="relative group">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" onkeyup="searchResources()" placeholder="Find a document..." 
                           class="w-full pl-14 pr-6 py-5 rounded-2xl border border-gray-200 focus:border-teal-600 focus:ring-4 focus:ring-teal-50 outline-none transition shadow-sm">
                </div>

                <div id="category-menu" class="flex flex-wrap justify-center gap-2">
                    <button onclick="filterContent('All')" class="cat-btn active border border-gray-200 px-6 py-2 rounded-full text-xs font-bold transition">All Resources <span id="count-All" class="opacity-40"></span></button>
                    <button onclick="filterContent('Wealth Management')" class="cat-btn border border-gray-200 px-6 py-2 rounded-full text-xs font-bold transition">Wealth Management <span id="count-Wealth" class="opacity-40"></span></button>
                    <button onclick="filterContent('Legal')" class="cat-btn border border-gray-200 px-6 py-2 rounded-full text-xs font-bold transition">Legal <span id="count-Legal" class="opacity-40"></span></button>
                    <button onclick="filterContent('Health')" class="cat-btn border border-gray-200 px-6 py-2 rounded-full text-xs font-bold transition">Health <span id="count-Health" class="opacity-40"></span></button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="results-text" class="mb-8 text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Full Collection</div>
        
        <div id="resource-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>

        <div id="empty-state" class="hidden py-24 text-center">
            <p class="text-gray-400 italic">No resources found matching that name.</p>
        </div>
    </main>

    <script>
        // YOUR LIVE GOOGLE SHEET LINK
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxzcavlDbKLy9R3JzW9MQHvRdXYShfTlcKUBd9Q6oBJEMfSLf6VFApV20gabxSHV4b-2lnuJ5AGppe/pub?output=csv';
        
        let allResources = [];
        let currentFilter = 'All';

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                allResources = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) return null;
                    return {
                        title: cols[0].replace(/"/g, "").trim(),
                        desc: cols[1].replace(/"/g, "").trim(),
                        category: cols[2].replace(/"/g, "").trim(),
                        link: cols[3].replace(/"/g, "").trim(),
                        img: cols[4] ? cols[4].replace(/"/g, "").trim() : null
                    };
                }).filter(r => r !== null && r.title !== "");

                updateCounters();
                renderCards(allResources);
            } catch (e) {
                console.error("CSV Load Failed", e);
            }
        }

        function updateCounters() {
            document.getElementById('count-All').innerText = `(${allResources.length})`;
            const cats = { 'Wealth': 'Wealth Management', 'Legal': 'Legal', 'Health': 'Health' };
            for (let key in cats) {
                const count = allResources.filter(r => r.category.includes(cats[key])).length;
                document.getElementById(`count-${key}`).innerText = `(${count})`;
            }
        }

        function filterContent(cat) {
            currentFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('results-text').innerText = cat === 'All' ? 'Full Collection' : `${cat} Focus`;
            searchResources();
        }

        function searchResources() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allResources.filter(r => {
                const matchesFilter = currentFilter === 'All' || r.category.includes(currentFilter);
                const matchesSearch = r.title.toLowerCase().includes(term) || r.desc.toLowerCase().includes(term);
                return matchesFilter && matchesSearch;
            });
            renderCards(filtered);
            document.getElementById('empty-state').className = filtered.length === 0 ? 'py-24 text-center' : 'hidden';
        }

        function renderCards(data) {
            const grid = document.getElementById('resource-grid');
            grid.innerHTML = data.map(r => `
                <div class="resource-card bg-white rounded-[2.5rem] border border-gray-100 overflow-hidden flex flex-col h-full shadow-sm">
                    <div class="card-image-container relative">
                        ${r.img ? `<img src="${r.img}" class="w-full h-full object-cover">` : 
                                  `<div class="w-full h-full flex items-center justify-center opacity-20"><i class="fas fa-file-pdf text-4xl text-white"></i></div>`}
                        <div class="absolute top-5 left-5 bg-white/90 backdrop-blur text-teal-900 text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest shadow-sm">
                            ${r.category}
                        </div>
                    </div>
                    <div class="p-10 flex flex-col flex-grow">
                        <h3 class="text-2xl font-bold text-teal-950 mb-4 leading-tight">${r.title}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed mb-8">${r.desc}</p>
                        <div class="mt-auto pt-6 border-t border-gray-50">
                            <a href="${r.link}" target="_blank" class="block w-full text-center py-4 bg-teal-900 text-white rounded-2xl font-bold hover:bg-teal-800 transition">Download / View</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function logout() { localStorage.removeItem('hub_access'); window.location.href = 'index.html'; }
        window.onload = loadData;
    </script>
</body>
</html>
