<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // 1. PRIVATE ACCESS CHECK
        if (localStorage.getItem('hub_access') !== 'granted_by_form') {
            window.location.href = "index.html#contact";
        }
    </script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Hub | WealthCare</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        h1 { font-family: 'Playfair Display', serif; }
        .hub-header { background: linear-gradient(135deg, #2d5a5a 0%, #1a3a3a 100%); }
        .cat-btn.active { background-color: #2d5a5a; color: white; border-color: #2d5a5a; }
    </style>
</head>
<body>

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 font-bold text-teal-900">
            <img src="img/logo.jpg" class="h-8 w-8 rounded-full"> Member Hub
        </div>
        <button onclick="localStorage.removeItem('hub_access'); window.location.href='index.html';" class="text-[10px] font-black tracking-widest text-gray-400 hover:text-red-500 transition">LOGOUT</button>
    </nav>

    <header class="hub-header py-16 text-white text-center px-6">
        <h1 class="text-4xl md:text-5xl mb-4">Education Library</h1>
        <p class="text-teal-100 opacity-80 max-w-2xl mx-auto mb-8">Select a category below to explore your resources.</p>
        
        <div id="category-menu" class="flex flex-wrap justify-center gap-3 max-w-4xl mx-auto">
            <button onclick="filterContent('All')" class="cat-btn active border border-white/30 px-6 py-2 rounded-full text-sm font-bold transition">All Resources</button>
            <button onclick="filterContent('Financial')" class="cat-btn border border-white/30 px-6 py-2 rounded-full text-sm font-bold transition">Financial & Assets</button>
            <button onclick="filterContent('Legal')" class="cat-btn border border-white/30 px-6 py-2 rounded-full text-sm font-bold transition">Legal Protections</button>
            <button onclick="filterContent('Health')" class="cat-btn border border-white/30 px-6 py-2 rounded-full text-sm font-bold transition">Health & Care</button>
            <button onclick="filterContent('Intellectual')" class="cat-btn border border-white/30 px-6 py-2 rounded-full text-sm font-bold transition">Ethical Legacy</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="resource-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQxzcavlDbKLy9R3JzW9MQHvRdXYShfTlcKUBd9Q6oBJEMfSLf6VFApV20gabxSHV4b-2lnuJ5AGppe/pub?output=csv';
        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                allData = rows.map(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 4) return null;
                    return {
                        title: cols[0].replace(/"/g, ""),
                        desc: cols[1].replace(/"/g, ""),
                        category: cols[2].replace(/"/g, "").trim(),
                        link: cols[3].replace(/"/g, "").trim(),
                        img: cols[4] ? cols[4].replace(/"/g, "").trim() : ""
                    };
                }).filter(item => item !== null);

                renderCards(allData);
            } catch (e) {
                console.error("Error loading CSV", e);
            }
        }

        function filterContent(category) {
            // 3. TRACKING: Send data to Google Analytics
            if (typeof gtag === 'function') {
                gtag('event', 'category_view', {
                    'event_category': 'Engagement',
                    'event_label': category
                });
            }

            // Update UI Buttons
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(category) || (category === 'All' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                }
            });

            const filtered = category === 'All' 
                ? allData 
                : allData.filter(item => item.category.toLowerCase().includes(category.toLowerCase()));
            
            renderCards(filtered);
        }

        function renderCards(data) {
            const grid = document.getElementById('resource-grid');
            grid.innerHTML = data.length ? '' : '<p class="col-span-full text-center py-10 text-gray-400">No resources found in this category.</p>';

            data.forEach(item => {
                const isVideo = item.link.includes('youtube') || item.link.includes('youtu.be');
                grid.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col transition hover:shadow-xl">
                        <div class="aspect-video bg-teal-900 flex items-center justify-center">
                            ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<i class="fas fa-file-alt text-5xl text-white/20"></i>`}
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <span class="text-[10px] font-black uppercase tracking-widest text-teal-700 mb-2">${item.category}</span>
                            <h3 class="text-xl font-bold text-gray-900 mb-2 leading-tight">${item.title}</h3>
                            <p class="text-gray-500 text-sm mb-6 flex-grow">${item.desc}</p>
                            
                            <div class="space-y-3">
                                <a href="${item.link}" target="_blank" class="block w-full text-center py-3 bg-teal-900 text-white rounded-xl font-bold text-sm">
                                    ${isVideo ? 'Watch Video' : 'View Resource'}
                                </a>
                                <a href="https://calendly.com/your-link" target="_blank" class="block w-full text-center py-3 border border-teal-900 text-teal-900 rounded-xl font-bold text-sm hover:bg-teal-50">
                                    Book Consultation
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
