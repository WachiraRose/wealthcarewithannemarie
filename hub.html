<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Education Hub | WealthCare with Annemarie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .filter-btn.active { background-color: #134e4a; color: white; border-color: #134e4a; }
        .resource-card { transition: all 0.4s ease; }
        .hidden-resource { display: none !important; }
        .loading-spinner { border-top-color: #134e4a; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="img/logo.jpg" class="h-8 w-8 rounded-full border">
            <span class="font-extrabold text-teal-900 uppercase italic text-xs">Wealthcare Hub</span>
        </div>
        <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-teal-900 uppercase tracking-widest">Exit Hub</a>
    </nav>

    <header class="py-16 px-6 bg-teal-950 text-white text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">Resource Library</h1>
            <p class="text-teal-200/70 text-lg">Your automated library for family security.</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 mt-12 space-y-6">
        <div class="flex flex-col items-center">
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="filterByTopic('all')" class="topic-btn active px-6 py-2 rounded-xl border-2 border-gray-200 font-bold text-xs">All Topics</button>
                <button onclick="filterByTopic('health')" class="topic-btn px-6 py-2 rounded-xl border-2 border-gray-200 font-bold text-xs">Health</button>
                <button onclick="filterByTopic('legal')" class="topic-btn px-6 py-2 rounded-xl border-2 border-gray-200 font-bold text-xs">Legal</button>
                <button onclick="filterByTopic('financial')" class="topic-btn px-6 py-2 rounded-xl border-2 border-gray-200 font-bold text-xs">Financial</button>
            </div>
        </div>
    </div>

    <section class="py-12 px-6 max-w-7xl mx-auto min-h-[400px]">
        <div id="loading" class="flex justify-center py-20">
            <div class="loading-spinner w-10 h-10 border-4 border-gray-200 rounded-full"></div>
        </div>
        <div id="resourceGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <script>
        // 1. REPLACE THIS WITH YOUR GOOGLE SCRIPT WEB APP URL
        const SHEET_API_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';

        let allResources = [];
        let currentTopic = 'all';

        // Gatekeeper
        if (localStorage.getItem('hub_access') !== 'true') {
            window.location.href = 'index.html';
        }

        async function fetchResources() {
            try {
                const response = await fetch(SHEET_API_URL);
                const data = await response.json();
                allResources = data;
                renderCards(allResources);
                document.getElementById('loading').classList.add('hidden');
            } catch (error) {
                console.error("Error loading resources:", error);
            }
        }

        function renderCards(resources) {
            const grid = document.getElementById('resourceGrid');
            grid.innerHTML = '';

            resources.forEach(item => {
                const icon = item.Format === 'video' ? 'fa-play' : (item.Format === 'pdf' ? 'fa-file-pdf' : 'fa-newspaper');
                const btnColor = item.Format === 'video' ? 'bg-teal-900' : 'bg-gray-900';
                
                const card = `
                    <div class="resource-card bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col" 
                         data-topic="${item.Topic.toLowerCase()}">
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-10 h-10 bg-gray-50 text-teal-900 rounded-lg flex items-center justify-center">
                                <i class="fas ${icon}"></i>
                            </div>
                            <span class="text-[10px] font-bold uppercase py-1 px-3 bg-teal-50 text-teal-700 rounded-full">${item.Topic}</span>
                        </div>
                        <h3 class="text-xl font-bold text-teal-900 mb-3">${item.Title}</h3>
                        <p class="text-gray-500 text-xs mb-8 flex-grow">${item.Description}</p>
                        <a href="${item.Link}" target="_blank" class="w-full text-center py-3 ${btnColor} text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:opacity-90 transition">View ${item.Format}</a>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterByTopic(topic) {
            currentTopic = topic;
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(topic)) btn.classList.add('active');
            });

            const cards = document.querySelectorAll('.resource-card');
            cards.forEach(card => {
                if (topic === 'all' || card.dataset.topic === topic) {
                    card.classList.remove('hidden-resource');
                } else {
                    card.classList.add('hidden-resource');
                }
            });
        }

        fetchResources();
    </script>
</body>
</html>
